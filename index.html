<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
  .app { width: 960px; }
  h1 { font-size: 20px; color: #e6edf3; }

  .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
  select, input {
    background: #0d1117; border: 1px solid #30363d; border-radius: 10px;
    color: #e6edf3; padding: 12px; font-size: 16px; outline: none; width: 100%;
  }
  select:focus, input:focus { border-color: #58a6ff; }
  .token-select { width: 120px; flex-shrink: 0; }
  .amount-input { flex: 1; }
  .slippage-input { width: 80px; flex-shrink: 0; text-align: center; }

  .swap-icon { text-align: center; margin: -4px 0; position: relative; z-index: 1; }
  .swap-icon button { background: #21262d; border: 3px solid #0d1117; border-radius: 10px; color: #8b949e; font-size: 18px; padding: 6px 10px; cursor: pointer; }
  .swap-icon button:hover { color: #e6edf3; }

  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-quote { background: #21262d; color: #e6edf3; }
  .btn-quote:hover { background: #30363d; }
  .btn-swap { background: #238636; color: #fff; }
  .btn-swap:hover { background: #2ea043; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .sources { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .src-card { flex: 1 1 180px; min-width: 160px; }
  .src-card { background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 14px; position: relative; transition: border-color 0.3s; }
  .src-card.winner { border-color: #3fb950; }
  .src-card.winner::before {
    content: 'BEST'; position: absolute; top: 10px; right: 10px;
    background: #238636; color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
  }
  .src-card.error-card { opacity: 0.5; }

  .src-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #8b949e; }
  .src-amount { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .src-price { font-size: 12px; color: #8b949e; margin-bottom: 10px; }

  .breakdown { border-top: 1px solid #21262d; padding-top: 8px; }
  .bk { display: flex; justify-content: space-between; padding: 2px 0; font-size: 11px; }
  .bk-l { color: #6e7681; }
  .bk-v { color: #8b949e; }
  .bk-v.good { color: #3fb950; }
  .bk-v.bad { color: #f85149; }

  .gas-bar { font-size: 12px; color: #8b949e; text-align: center; margin-bottom: 12px; }
  .gas-val { color: #f0883e; font-weight: 600; }

  .wallet-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .wallet-btn { background: #21262d; border: 1px solid #30363d; border-radius: 10px; color: #e6edf3; padding: 8px 14px; font-size: 13px; cursor: pointer; }
  .wallet-btn:hover { background: #30363d; }
  .wallet-addr { font-size: 12px; color: #3fb950; font-family: monospace; }

  .status { text-align: center; padding: 16px; color: #8b949e; font-size: 13px; }
  .status.error { color: #f85149; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .diff-bar { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 10px 14px; margin-top: 10px; text-align: center; font-size: 13px; color: #8b949e; }
  .diff-val { color: #3fb950; font-weight: 700; }
</style>
</head>
<body>
<div class="app">
  <div class="wallet-bar">
    <h1>Swap</h1>
    <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">Connect Rabby</button>
  </div>
  <div class="gas-bar">Base fee: <span class="gas-val" id="gasVal">--</span></div>

  <div class="card">
    <label>You sell <span id="sellUsd" style="float:right;color:#8b949e;font-weight:400;text-transform:none"></span></label>
    <div class="row">
      <select id="sellToken" class="token-select" onchange="clearResult()">
        <option value="USDC" data-addr="0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48" data-dec="6">USDC</option>
        <option value="USDT" data-addr="0xdAC17F958D2ee523a2206206994597C13D831ec7" data-dec="6">USDT</option>
        <option value="DAI" data-addr="0x6B175474E89094C44Da98b954EedeAC495271d0F" data-dec="18">DAI</option>
        <option value="WETH" data-addr="0xC02aaA39b223FE8D0A0E5C4F27eAD9083C756Cc2" data-dec="18">WETH</option>
        <option value="WBTC" data-addr="0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599" data-dec="8">WBTC</option>
      </select>
      <input type="number" id="sellAmount" class="amount-input" value="5000" min="0" step="any" oninput="clearResult()">
      <div style="text-align:center">
        <label>Slippage</label>
        <input type="number" id="slippage" class="slippage-input" value="0.1" min="0.01" max="50" step="0.1" oninput="clearResult()">
      </div>
    </div>
  </div>

  <div class="swap-icon"><button onclick="flipTokens()">&#x2195;</button></div>

  <div class="card">
    <label>You receive (best) <span id="buyUsd" style="float:right;color:#8b949e;font-weight:400;text-transform:none"></span></label>
    <div class="row">
      <select id="buyToken" class="token-select" onchange="clearResult()">
        <option value="WETH" data-addr="0xC02aaA39b223FE8D0A0E5C4F27eAD9083C756Cc2" data-dec="18">WETH</option>
        <option value="USDC" data-addr="0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48" data-dec="6">USDC</option>
        <option value="USDT" data-addr="0xdAC17F958D2ee523a2206206994597C13D831ec7" data-dec="6">USDT</option>
        <option value="DAI" data-addr="0x6B175474E89094C44Da98b954EedeAC495271d0F" data-dec="18">DAI</option>
        <option value="WBTC" data-addr="0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599" data-dec="8">WBTC</option>
      </select>
      <input type="text" id="buyAmount" class="amount-input" readonly placeholder="--" style="color:#8b949e">
    </div>
  </div>

  <div class="card" style="padding:10px 14px">
    <label style="font-size:11px">Add custom token (paste address)</label>
    <div class="row" style="gap:8px">
      <input type="text" id="customTokenAddr" class="amount-input" placeholder="0x..." style="flex:1" />
      <button class="btn btn-quote" style="width:auto;padding:8px 16px;font-size:13px" onclick="addCustomToken()">Add</button>
    </div>
    <div id="customTokenStatus" style="font-size:11px;color:#8b949e;margin-top:6px"></div>
  </div>

  <button class="btn btn-quote" id="quoteBtn" onclick="getQuote()">Get Best Price</button>
  <div id="resultArea"></div>
</div>

<script>
let account = null, lastQuote = null;

function sel(id) {
  const s = document.getElementById(id);
  const o = s.options[s.selectedIndex];
  return { symbol: o.value, addr: o.dataset.addr, dec: parseInt(o.dataset.dec) };
}
function fmt(wei, dec) {
  const n = parseFloat(wei) / Math.pow(10, dec);
  if (n > 10000) return n.toLocaleString('en-US', {maximumFractionDigits: 2});
  if (n > 100) return n.toLocaleString('en-US', {maximumFractionDigits: 3});
  if (n > 1) return n.toLocaleString('en-US', {maximumFractionDigits: 4});
  return n.toLocaleString('en-US', {maximumFractionDigits: 6});
}
function toWei(a, d) { return BigInt(Math.round(parseFloat(a) * Math.pow(10, d))).toString(); }
function clearResult() { document.getElementById('resultArea').innerHTML = ''; lastQuote = null; document.getElementById('buyAmount').value = ''; }
function flipTokens() { const s = document.getElementById('sellToken'), b = document.getElementById('buyToken'), sv = s.value; s.value = b.value; b.value = sv; clearResult(); }

const CUSTOM_TOKEN_KEY = 'swap_compare_custom_tokens';

function loadCustomTokens() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_TOKEN_KEY) || '[]'); }
  catch (e) { return []; }
}

function saveCustomTokens(list) {
  try { localStorage.setItem(CUSTOM_TOKEN_KEY, JSON.stringify(list)); }
  catch (e) { /* ignore */ }
}

function addTokenOptionToSelect(selectId, info, selectIt) {
  const sel = document.getElementById(selectId);
  // Skip if already present (by address, case-insensitive)
  for (const opt of sel.options) {
    if (opt.dataset.addr && opt.dataset.addr.toLowerCase() === info.addr.toLowerCase()) {
      if (selectIt) sel.value = opt.value;
      return;
    }
  }
  const opt = document.createElement('option');
  const label = info.symbol.length > 12 ? info.symbol.slice(0, 12) : info.symbol;
  opt.value = label + '_' + info.addr.slice(2, 6).toUpperCase();
  opt.textContent = label + ' (custom)';
  opt.dataset.addr = info.addr;
  opt.dataset.dec = String(info.decimals);
  sel.appendChild(opt);
  if (selectIt) sel.value = opt.value;
}

function registerCustomToken(info, selectIt) {
  addTokenOptionToSelect('sellToken', info, selectIt);
  addTokenOptionToSelect('buyToken', info, false);
}

async function addCustomToken() {
  const input = document.getElementById('customTokenAddr');
  const status = document.getElementById('customTokenStatus');
  const addr = (input.value || '').trim();
  if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
    status.textContent = 'Invalid address format';
    status.style.color = '#f85149';
    return;
  }
  status.textContent = 'Loading metadata...';
  status.style.color = '#8b949e';
  try {
    const r = await fetch(`/api/token?addr=${addr}`);
    const info = await r.json();
    if (info.error) {
      status.textContent = 'Error: ' + info.error;
      status.style.color = '#f85149';
      return;
    }
    registerCustomToken(info, true);
    const persisted = loadCustomTokens();
    if (!persisted.find(t => t.addr.toLowerCase() === info.addr.toLowerCase())) {
      persisted.push(info);
      saveCustomTokens(persisted);
    }
    status.textContent = `Added ${info.symbol} (${info.decimals} decimals) — selected as sell token`;
    status.style.color = '#3fb950';
    input.value = '';
    clearResult();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    status.style.color = '#f85149';
  }
}

async function connectWallet() {
  if (!window.ethereum) { alert('Rabby/MetaMask not found'); return; }
  try {
    const accs = await window.ethereum.request({method: 'eth_requestAccounts'});
    account = accs[0];
    document.getElementById('walletBtn').innerHTML = `<span class="wallet-addr">${account.slice(0,6)}...${account.slice(-4)}</span>`;
  } catch(e) { console.error(e); }
}

async function fetchGas() {
  try {
    const r = await fetch('/api/gas');
    const d = await r.json();
    if (d.baseFee) {
      const gwei = v => (parseInt(v) / 1e9).toFixed(3);
      document.getElementById('gasVal').textContent =
        `Low ${gwei(d.low.maxFeePerGas)} / Base ${gwei(d.baseFee)} / High ${gwei(d.high.maxFeePerGas)} Gwei`;
    }
  } catch(e) {}
}

// Sources that backend can build a tx for (intent-based ones excluded).
const EXECUTABLE_SOURCES = new Set(['1inch_classic', 'fynd', 'kyberswap', 'enso', 'openocean']);

function sourceCard(name, label, feeBps, data, buyDec, buySym, sellAmount, gasPrice, isWinner, dstPrice) {
  if (!data) return `<div class="src-card error-card"><div class="src-name">${label}</div><div class="status error" style="padding:8px;font-size:11px">unavailable</div></div>`;

  const outRaw = parseFloat(data.amount_out);
  const grossOut = outRaw / Math.pow(10, buyDec);  // quote = gross (fee is on-chain)
  const sellUsd = parseFloat(sellAmount);

  // On-chain fee (deducted by smart contract at execution)
  const feeLost = grossOut * feeBps / 10000;
  const netOut = grossOut - feeLost;
  const feeUsd = dstPrice ? feeLost * dstPrice : sellUsd * feeBps / 10000;

  // Execution price (after on-chain fee)
  const execPrice = sellUsd / netOut;

  const gasUnits = parseInt(data.gas_estimate || data.gas || '0');
  const gp = parseInt(data.gas_price || gasPrice || '50000000');
  const gasETH = gasUnits * gp / 1e18;
  const gasUsd = dstPrice ? gasETH * dstPrice : 0;

  const isGasless = name === '1inch_fusion';
  const displaySym = (data.receives_native_eth && name !== 'fynd') ? 'ETH' : buySym;

  const canExec = EXECUTABLE_SOURCES.has(name) && account;
  const clickAttr = canExec
    ? ` onclick="doSwap('${name}')" style="cursor:pointer" title="Swap via ${label}"`
    : '';
  let h = `<div class="src-card${isWinner ? ' winner' : ''}"${clickAttr}>`;
  h += `<div class="src-name">${label}</div>`;

  // Quote output (routing quality, pre on-chain fee)
  h += `<div class="src-amount">${grossOut.toFixed(6)} ${displaySym}</div>`;
  h += `<div class="src-price">after fee: ${netOut.toFixed(6)} | 1 ${displaySym} = $${execPrice.toFixed(2)}${data.receives_native_eth && name !== 'fynd' ? ' (native)' : ''}</div>`;

  h += `<div class="breakdown">`;
  h += `<div class="bk"><span class="bk-l">Quote (routing)</span><span class="bk-v">${grossOut.toFixed(6)}</span></div>`;
  h += `<div class="bk"><span class="bk-l">On-chain fee (${feeBps} bps)</span><span class="bk-v bad">-${feeLost.toFixed(6)} (~$${feeUsd.toFixed(2)})</span></div>`;
  h += `<div class="bk"><span class="bk-l">You receive</span><span class="bk-v">${netOut.toFixed(6)}</span></div>`;

  if (isGasless) {
    h += `<div class="bk"><span class="bk-l">Gas</span><span class="bk-v good">gasless</span></div>`;
  } else if (gasUnits > 0) {
    h += `<div class="bk"><span class="bk-l">Gas</span><span class="bk-v bad">${gasUnits.toLocaleString()} units (~$${gasUsd.toFixed(2)})</span></div>`;
  } else {
    h += `<div class="bk"><span class="bk-l">Gas</span><span class="bk-v">n/a</span></div>`;
  }

  if (data.route) h += `<div class="bk"><span class="bk-l">Route</span><span class="bk-v">${data.route}</span></div>`;
  if (data.solve_time_ms !== undefined) h += `<div class="bk"><span class="bk-l">Solve</span><span class="bk-v">${data.solve_time_ms}ms</span></div>`;
  if (data.block) h += `<div class="bk"><span class="bk-l">Block</span><span class="bk-v">#${data.block}</span></div>`;

  h += `</div></div>`;
  return h;
}

async function getQuote() {
  const btn = document.getElementById('quoteBtn');
  const area = document.getElementById('resultArea');
  const sell = sel('sellToken'), buy = sel('buyToken');
  const amount = document.getElementById('sellAmount').value;
  if (!amount || parseFloat(amount) <= 0) return;

  btn.disabled = true; btn.textContent = 'Finding best price...';
  area.innerHTML = '<div class="status"><span class="spinner"></span>Comparing 1inch Classic, Fusion & Fynd...</div>';

  try {
    const sender = account || '';
    const slippage = document.getElementById('slippage').value;
    const r = await fetch(`/api/quote?src=${sell.addr}&dst=${buy.addr}&amount=${toWei(amount, sell.dec)}&sender=${sender}&slippage=${slippage}`);
    const d = await r.json();
    lastQuote = d;

    document.getElementById('buyAmount').value = fmt(d.best_amount_out, buy.dec);

    // Show USD values
    if (d.prices) {
      const srcPrice = d.prices.src;
      const dstPrice = d.prices.dst;
      if (srcPrice) {
        const sellUsd = parseFloat(amount) * srcPrice;
        document.getElementById('sellUsd').textContent = `$${sellUsd.toLocaleString('en-US', {maximumFractionDigits: 2})} | 1 ${sell.symbol} = $${srcPrice.toFixed(2)}`;
      }
      if (dstPrice) {
        const bestHuman = parseFloat(d.best_amount_out) / Math.pow(10, buy.dec);
        const buyUsd = bestHuman * dstPrice;
        document.getElementById('buyUsd').textContent = `$${buyUsd.toLocaleString('en-US', {maximumFractionDigits: 2})} | 1 ${buy.symbol} = $${dstPrice.toFixed(2)}`;
      }
    }

    const gp = d.gas_price || '50000000';
    const dp = d.prices?.dst || 0;

    let html = '<div class="sources">';
    html += sourceCard('1inch_classic', '1inch Classic', 30, d.inch_classic, buy.dec, buy.symbol, amount, gp, d.winner === '1inch_classic', dp);
    html += sourceCard('1inch_fusion', '1inch Fusion', 30, d.inch_fusion, buy.dec, buy.symbol, amount, gp, d.winner === '1inch_fusion', dp);
    html += sourceCard('fynd', 'Fynd', 10, d.fynd, buy.dec, buy.symbol, amount, gp, d.winner === 'fynd', dp);
    html += sourceCard('kyberswap', 'KyberSwap', 0, d.kyberswap, buy.dec, buy.symbol, amount, gp, d.winner === 'kyberswap', dp);
    html += sourceCard('cowswap', 'CowSwap', 0, d.cowswap, buy.dec, buy.symbol, amount, gp, d.winner === 'cowswap', dp);
    html += sourceCard('enso', 'Enso', 0, d.enso, buy.dec, buy.symbol, amount, gp, d.winner === 'enso', dp);
    html += sourceCard('openocean', 'OpenOcean', 0, d.openocean, buy.dec, buy.symbol, amount, gp, d.winner === 'openocean', dp);
    html += '</div>';

    // Routing quality comparison (quote = gross, fees are on-chain)
    const routing = [];
    if (d.inch_classic) routing.push({name: '1inch', out: parseFloat(d.inch_classic.amount_out)});
    if (d.fynd) routing.push({name: 'Fynd', out: parseFloat(d.fynd.amount_out)});
    if (d.kyberswap) routing.push({name: 'KyberSwap', out: parseFloat(d.kyberswap.amount_out)});
    if (d.cowswap) routing.push({name: 'CowSwap', out: parseFloat(d.cowswap.amount_out)});
    if (d.enso) routing.push({name: 'Enso', out: parseFloat(d.enso.amount_out)});
    if (d.openocean) routing.push({name: 'OpenOcean', out: parseFloat(d.openocean.amount_out)});

    if (routing.length >= 2) {
      routing.sort((a,b) => b.out - a.out);
      const r = routing[0], r2 = routing[1];
      const rdiff = (r.out - r2.out) / Math.pow(10, buy.dec);
      const rbps = ((r.out - r2.out) / r2.out * 10000).toFixed(1);
      html += `<div class="diff-bar" style="border-color:#1f6feb">
        <div style="font-size:11px;color:#6e7681;margin-bottom:4px">ROUTING (quote output, before on-chain fee)</div>
        <span class="diff-val" style="color:#79c0ff">${r.name}</span> finds
        <span class="diff-val" style="color:#79c0ff">+${rdiff.toFixed(6)} ${buy.symbol}</span> better route
        (<span class="diff-val" style="color:#79c0ff">${rbps} bps</span>)
      </div>`;
    }

    // Execution comparison (after on-chain fees: 1inch 30bps, Fynd 10bps)
    const FEES = {'1inch Classic': 0.003, '1inch Fusion': 0.003, 'Fynd': 0.001};
    const exec = [];
    if (d.inch_classic) exec.push({name: '1inch Classic', out: parseFloat(d.inch_classic.amount_out) * (1 - 0.003)});
    if (d.inch_fusion) exec.push({name: '1inch Fusion', out: parseFloat(d.inch_fusion.amount_out) * (1 - 0.003)});
    if (d.fynd) exec.push({name: 'Fynd', out: parseFloat(d.fynd.amount_out) * (1 - 0.001)});
    if (d.kyberswap) exec.push({name: 'KyberSwap', out: parseFloat(d.kyberswap.amount_out)});
    if (d.cowswap) exec.push({name: 'CowSwap', out: parseFloat(d.cowswap.amount_out)});
    if (d.enso) exec.push({name: 'Enso', out: parseFloat(d.enso.amount_out)});
    if (d.openocean) exec.push({name: 'OpenOcean', out: parseFloat(d.openocean.amount_out)});

    if (exec.length >= 2) {
      exec.sort((a,b) => b.out - a.out);
      const best = exec[0], second = exec[1];
      const diff = (best.out - second.out) / Math.pow(10, buy.dec);
      const diffBps = ((best.out - second.out) / second.out * 10000).toFixed(1);
      html += `<div class="diff-bar">
        <div style="font-size:11px;color:#6e7681;margin-bottom:4px">EXECUTION (after on-chain fee: 1inch 30 bps, Fynd 10 bps)</div>
        <span class="diff-val">${best.name}</span> gives
        <span class="diff-val">+${diff.toFixed(6)} ${buy.symbol}</span> more
        (<span class="diff-val">${diffBps} bps</span>)
      </div>`;
    }

    // Swap button — fall back to first executable source if winner is intent-based
    if (account) {
      const INTENT_BASED = new Set(['1inch_fusion', 'cowswap']);
      const LABELS = {
        '1inch_classic': '1inch Classic',
        '1inch_fusion': '1inch Fusion',
        'fynd': 'Fynd',
        'kyberswap': 'KyberSwap',
        'cowswap': 'CowSwap',
        'enso': 'Enso',
        'openocean': 'OpenOcean',
      };
      let execSource = d.winner;
      let note = '';
      if (INTENT_BASED.has(d.winner)) {
        // Rank executable venues by NET output using integer bps math
        // (BigInt throughout — avoids float precision loss on wei amounts).
        // Mirror of ON_CHAIN_FEE in server.py — keep in sync.
        const FEE_BPS = {
          '1inch_classic': 30n, 'fynd': 10n, 'kyberswap': 0n,
          'enso': 0n, 'openocean': 0n,
        };
        const executable = ['1inch_classic', 'fynd', 'kyberswap', 'enso', 'openocean'];
        let best = '1inch_classic', bestNet = 0n;
        for (const s of executable) {
          const key = s === '1inch_classic' ? 'inch_classic' : s;
          const v = d[key];
          if (v) {
            const net = BigInt(v.amount_out || 0) * (10000n - (FEE_BPS[s] || 0n));
            if (net > bestNet) { bestNet = net; best = s; }
          }
        }
        execSource = best;
        note = ` (${LABELS[d.winner]} is intent-based, click any card to choose)`;
      }
      const winLabel = LABELS[execSource] || execSource;
      html += `<button class="btn btn-swap" onclick="doSwap('${execSource}')">Swap via ${winLabel}${note}</button>`;
    } else {
      html += `<button class="btn btn-swap" onclick="connectWallet()" style="background:#1f6feb">Connect wallet to swap</button>`;
    }

    area.innerHTML = html;
  } catch(e) {
    area.innerHTML = `<div class="status error">${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Get Best Price';
  }
}

async function waitForReceipt(txHash, maxSeconds = 180) {
  const startMs = Date.now();
  while (Date.now() - startMs < maxSeconds * 1000) {
    try {
      const receipt = await window.ethereum.request({
        method: 'eth_getTransactionReceipt',
        params: [txHash],
      });
      if (receipt) return receipt;
    } catch (e) { /* keep polling */ }
    await new Promise(r => setTimeout(r, 2500));
  }
  return null;
}

async function doSwap(execSource) {
  if (!account || !lastQuote) return;
  const area = document.getElementById('resultArea');
  const sell = sel('sellToken'), buy = sel('buyToken');
  const amount = document.getElementById('sellAmount').value;
  const slippage = document.getElementById('slippage').value;
  const source = execSource || lastQuote.winner;
  const swapUrl = `/api/swap?src=${sell.addr}&dst=${buy.addr}&amount=${toWei(amount, sell.dec)}&sender=${account}&slippage=${slippage}&source=${source}`;

  area.innerHTML += '<div class="status"><span class="spinner"></span>Getting calldata...</div>';
  try {
    let r = await fetch(swapUrl);
    let d = await r.json();
    if (d.error) { area.innerHTML += `<div class="status error">${d.error}</div>`; return; }

    // Approval flow: if backend reports insufficient allowance, dispatch approve first.
    if (d.approval) {
      const note = d.approval_check_failed
        ? ' (allowance check via RPC failed, approving defensively)'
        : '';
      area.innerHTML += `<div class="status">Approval required${note}. Confirm in Rabby...</div>`;
      const approveHash = await window.ethereum.request({
        method: 'eth_sendTransaction',
        params: [{
          from: account,
          to: d.approval.to,
          data: d.approval.data,
          value: '0x0',
        }],
      });
      area.innerHTML += `<div class="status">Approve tx <a href="https://etherscan.io/tx/${approveHash}" target="_blank" style="color:#58a6ff">${approveHash.slice(0,14)}...</a> sent. Waiting for confirmation...</div>`;
      const receipt = await waitForReceipt(approveHash);
      if (!receipt || receipt.status !== '0x1') {
        area.innerHTML += '<div class="status error">Approval not confirmed within 3 minutes — aborting swap</div>';
        return;
      }
      area.innerHTML += '<div class="status">Approval confirmed. Re-fetching swap calldata...</div>';
      r = await fetch(swapUrl);
      d = await r.json();
      if (d.error) { area.innerHTML += `<div class="status error">${d.error}</div>`; return; }
      if (d.approval) {
        area.innerHTML += '<div class="status error">Approval still insufficient after confirmation — aborting</div>';
        return;
      }
    }

    if (d.tx) {
      area.innerHTML += '<div class="status"><span class="spinner"></span>Confirm swap in Rabby...</div>';
      const txHash = await window.ethereum.request({
        method: 'eth_sendTransaction',
        params: [{ from: account, to: d.tx.to, data: d.tx.data, value: d.tx.value ? ('0x' + parseInt(d.tx.value).toString(16)) : '0x0' }]
      });
      area.innerHTML += `<div class="status" style="color:#3fb950">Sent! <a href="https://etherscan.io/tx/${txHash}" target="_blank" style="color:#58a6ff">${txHash.slice(0,14)}...</a></div>`;
    }
  } catch(e) { area.innerHTML += `<div class="status error">${e.message}</div>`; }
}

// Restore previously-added custom tokens from localStorage
loadCustomTokens().forEach(t => registerCustomToken(t, false));

fetchGas(); setInterval(fetchGas, 30000);
if (window.ethereum?.selectedAddress) {
  account = window.ethereum.selectedAddress;
  document.getElementById('walletBtn').innerHTML = `<span class="wallet-addr">${account.slice(0,6)}...${account.slice(-4)}</span>`;
}
</script>
